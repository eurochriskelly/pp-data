volumes:
  pp_data:

networks:
  external_net: {}
  internal_net:
    internal: true
    driver_opts:
      com.docker.network.bridge.enable_icc: "true"

secrets:
  mldb_admin_password:
    file: ./mldb_admin_password.txt
  mldb_admin_username:
    file: ./mldb_admin_username.txt
  mldb_wallet_password:
    file: ./mldb_wallet_password.txt

services:
  marklogic:
    image: ${harborDomain}/${harborDockerHub}/${mlImage}:${mlVersionTag}
    platform: linux/amd64
    extra_hosts:
      host.docker.internal: host-gateway
    ports:
      - "${mlHealtCheckPortMapping}"
      - "${mlSystemPortMapping}"
      - "${mlApplicationPortMapping}"
      - "${mlUnitTestPortMapping}"
    hostname: "${mlHost}.db"
    container_name: "${mlHost}.db"
    secrets:
      - mldb_admin_password
      - mldb_admin_username
      - mldb_wallet_password
    environment:
      - MARKLOGIC_INIT=true
      - MARKLOGIC_ADMIN_USERNAME_FILE=mldb_admin_username
      - MARKLOGIC_ADMIN_PASSWORD_FILE=mldb_admin_password
      - MARKLOGIC_WALLET_PASSWORD_FILE=mldb_wallet_password
      - ML_HUGEPAGES_TOTAL=2800
      - TZ=${TZ_AMSTERDAM}
    volumes:
      - pp_data:/var/opt/MarkLogic
      - ./logs/:/var/opt/MarkLogic/Logs:delegated
      - ./debug:/data/debug
      - ./backup:/data/backup
    networks:
      - external_net
      - internal_net
